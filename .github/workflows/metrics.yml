name: Metrics Embed

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          user: RXDCODX
          template: classic
          config_presets: "@lunar-red"
          base: header, activity, community, repositories, metadata
          config_display: large
          config_animations: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_stars: yes
          plugin_stars_limit: 5
          filename: github-metrics.svg

      - name: Deploy to output branch
        run: |
          mv github-metrics.svg /tmp/github-metrics.svg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/github-metrics.svg ./
          git add -A
          git diff --cached --quiet || git commit -m "update metrics [skip ci]"
          git push origin output
