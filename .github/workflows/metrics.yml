name: Metrics Embed

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          user: RXDCODX
          template: classic
          base: header, activity, community, repositories, metadata
          config_display: large
          config_animations: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_calendar: yes
          plugin_calendar_limit: 7
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_stars: yes
          plugin_stars_limit: 5
          palette: >
            {
              "background": "#0D1117",
              "title": { "text": "#FF3333", "background": "#161B22" },
              "icon": "#FF3333",
              "text": "#C9D1D9",
              "subtext": "#8B949E",
              "border": "#30363D"
            }
          output: dist/metrics.classic.svg

      - name: Copy existing output branch content
        run: |
          mkdir -p dist
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git worktree add wt-output origin/output
            cp wt-output/*.svg wt-output/*.gif dist/ 2>/dev/null || true
            rm -rf wt-output
          fi

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
