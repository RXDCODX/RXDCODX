name: Metrics Embed

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          user: RXDCODX
          template: classic
          config_presets: "@lunar-red"
          base: header, activity, community, repositories, metadata
          config_display: large
          config_animations: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_stars: yes
          plugin_stars_limit: 5
          plugin_calendar: no

      - name: Prepare dist
        run: |
          mkdir -p dist
          mv metrics.classic.svg dist/ 2>/dev/null || true
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git worktree add wt-output origin/output
            cp wt-output/*.svg wt-output/*.gif dist/ 2>/dev/null || true
            rm -rf wt-output
          fi
          ls -la dist/

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
