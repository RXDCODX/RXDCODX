name: Generate Matrix GIF

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps for canvas
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev ffmpeg

      - name: Install canvas
        run: |
          npm init -y
          npm install canvas

      - name: Render Matrix GIF
        run: node .github/scripts/capture-matrix.js

      - name: Copy existing output branch content
        run: |
          mkdir -p dist
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git worktree add wt-output origin/output
            cp wt-output/*.svg dist/ 2>/dev/null || true
            rm -rf wt-output
          fi

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
