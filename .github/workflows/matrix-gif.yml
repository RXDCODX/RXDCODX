name: Generate Matrix GIF

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps for canvas
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev ffmpeg

      - name: Install canvas
        run: |
          npm init -y
          npm install canvas

      - name: Render Matrix GIF
        run: node .github/scripts/capture-matrix.js

      - name: Deploy to output branch
        run: |
          cp dist/matrix-rain.gif /tmp/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/matrix-rain.gif ./
          git add -A
          git diff --cached --quiet || git commit -m "update matrix [skip ci]"
          git push origin output
