name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: RXDCODX
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=%23E53228&color_dots=%23161B22,%23820711,%23e53228,%23fb7252,%23fcaf93
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23E53228&color_dots=%23161B22,%23820711,%23e53228,%23fb7252,%23fcaf93

      - name: Deploy to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi
          cp dist/*.svg ./
          git add -A
          git diff --cached --quiet || git commit -m "update snake [skip ci]"
          git push origin output
