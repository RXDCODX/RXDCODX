name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: RXDCODX
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=%23E53228&color_dots=%23161B22,%23820711,%23e53228,%23fb7252,%23fcaf93
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23E53228&color_dots=%23161B22,%23820711,%23e53228,%23fb7252,%23fcaf93

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
