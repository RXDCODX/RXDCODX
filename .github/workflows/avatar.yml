name: Generate Avatar SVG

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Embed avatar into SVG
        run: node .github/scripts/embed-avatar.js

      - name: Deploy to output branch
        run: |
          cp dist/avatar-electric.svg /tmp/avatar-electric.svg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/avatar-electric.svg ./
          git add -A
          git diff --cached --quiet || git commit -m "update avatar [skip ci]"
          git push origin output
